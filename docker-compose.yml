services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nova}
      POSTGRES_USER: ${POSTGRES_USER:-nova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nova_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nova} -d ${POSTGRES_DB:-nova}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - nova_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # HexStrike AI — tool execution backend (Hexx98/hexstrike-ai submodule)
  # No host ports exposed — accessible only on nova_net
  hexstrike:
    build:
      context: ./hexstrike
      dockerfile: Dockerfile
    environment:
      HEXSTRIKE_MODE: nova_controlled
      HEXSTRIKE_PORT: 9000
    networks:
      - nova_net
    volumes:
      - wordlists:/wordlists:ro
      - hexstrike_output:/output
    restart: unless-stopped
    user: hexstrike

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nova}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nova}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      HEXSTRIKE_URL: http://hexstrike:9000
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      CELERY_HMAC_SECRET: ${CELERY_HMAC_SECRET}
      METASPLOIT_RPC_HOST: ${METASPLOIT_RPC_HOST:-}
      METASPLOIT_RPC_PORT: ${METASPLOIT_RPC_PORT:-55553}
      METASPLOIT_RPC_PASSWORD: ${METASPLOIT_RPC_PASSWORD:-}
      TITANUX_URL: ${TITANUX_URL:-}
      TITANUX_API_KEY: ${TITANUX_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nova_net
    volumes:
      - engagements:/app/engagements
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    restart: unless-stopped

  # Celery worker — same image as backend, different entrypoint
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker worker --loglevel=info --concurrency=4 -Q nova_tasks
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nova}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nova}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      HEXSTRIKE_URL: http://hexstrike:9000
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      CELERY_HMAC_SECRET: ${CELERY_HMAC_SECRET}
      METASPLOIT_RPC_HOST: ${METASPLOIT_RPC_HOST:-}
      METASPLOIT_RPC_PORT: ${METASPLOIT_RPC_PORT:-55553}
      METASPLOIT_RPC_PASSWORD: ${METASPLOIT_RPC_PASSWORD:-}
      TITANUX_URL: ${TITANUX_URL:-}
      TITANUX_API_KEY: ${TITANUX_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hexstrike:
        condition: service_started
    networks:
      - nova_net
    volumes:
      - engagements:/app/engagements
      - wordlists:/wordlists
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker", "inspect", "ping", "--timeout=5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "3"
          memory: 2G
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_BUILD_TARGET:-development}
    networks:
      - nova_net
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - nova_net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  hexstrike_output:
  engagements:
  wordlists:

networks:
  nova_net:
    driver: bridge
